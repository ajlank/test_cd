name: Flutter CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ hashFiles('testcd/pubspec.lock') }}
          restore-keys: |
            pub-cache-

      - name: Install dependencies
        run: flutter pub get
        working-directory: testcd

      - name: Analyze code
        run: flutter analyze
        working-directory: testcd

      - name: Run tests
        run: flutter test
        working-directory: testcd

      - name: Build APK
        run: flutter build apk --release
        working-directory: testcd

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: testcd/build/app/outputs/flutter-apk/app-release.apk
